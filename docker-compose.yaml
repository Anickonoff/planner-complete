version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: planner-backend
    restart: unless-stopped

    env_file:
      - .env
    
    environment:
      PORT: 3000
      DATA_FILE_PATH: /repo/backend/data/events.json
      LOG_DIR: /repo/backend/logs
    
    volumes:
      - ./backend/data:/repo/backend/data
      - ./backend/logs:/repo/backend/logs

    ports:
      - "3000:3000"

    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3000/health', r => process.exit(r.statusCode === 200 ? 0 : 1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
